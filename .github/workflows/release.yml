name: Release Plugin

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Generate artifact attestation for main.js
        uses: actions/attest@v4
        with:
          subject-path: 'main.js'

      - name: Generate artifact attestation for manifest.json
        uses: actions/attest@v4
        with:
          subject-path: 'manifest.json'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Release of version ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
